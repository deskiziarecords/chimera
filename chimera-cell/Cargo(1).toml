[package]
name = "chimera-cell"
version = "0.1.0"
edition = "2021"
authors = ["José Roberto Jiménez Cordero <tijuanapaint@gmail.com>"]
license = "MIT"
description = "WASM execution sandbox for ChimeraOS"

[dependencies]
# Internal Workspace Dependencies
chimera-core = { path = "../chimera-core" }
chimera-fabric = { path = "../chimera-fabric" }
chimera-crypto = { path = "../chimera-crypto" }

# External Dependencies
wasmtime = "14.0"              # WASM runtime as specified in roadmap
tokio = { version = "1.35", features = ["full"] }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
anyhow = "1.0"

# Optional features for enhanced security
[features]
default = ["sandbox-isolation"]
sandbox-isolation = []         # Enable strict WASM sandboxing
profiling = []                 # Enable execution profiling for optimization

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"

[[bench]]
name = "wasm_execution_benchmark"
harness = false